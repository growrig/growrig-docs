<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="GrowRig">
  <!-- Sprout knocked out (transparent) of the square, so the background shows
       through the sprout: dark on light, light on dark. Sharp corners. -->
  <mask id="gr-sprout-sq" maskUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
    <rect width="1024" height="1024" fill="#fff"/>
    <g transform="translate(212 212) scale(25)" fill="none" stroke="#000"
       stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 20h10"/>
      <path d="M10 20c5.5-2.5.8-6.4 3-10"/>
      <path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/>
      <path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>
    </g>
  </mask>
  <rect width="1024" height="1024" fill="#34b16a" mask="url(#gr-sprout-sq)"/>
</svg>
