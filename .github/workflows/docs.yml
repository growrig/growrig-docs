name: Docs

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out docs
        uses: actions/checkout@v4

      - name: Check out GrowRig project docs
        uses: actions/checkout@v4
        with:
          repository: growrig/growrig
          path: source/growrig
          sparse-checkout: |
            docs
            ROADMAP.md
            CONTRIBUTING.md
            GOVERNANCE.md

      - name: Check out GrowRig Platform
        uses: actions/checkout@v4
        with:
          repository: growrig/growrig-platform
          path: source/growrig-platform
          sparse-checkout: |
            devices

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate reference docs
        run: npm run generate

      - name: Smoke-test generated docs
        run: npm run test:generated

      - name: Check site
        run: npm run check

      - name: Build site
        run: npm run build
        env:
          SITE_URL: https://docs.growrig.org

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
